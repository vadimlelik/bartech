name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/bartech

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Упрощенная сборка без кеша из registry (требует меньше прав)
          # Если нужен кеш, раскомментируйте строки ниже и убедитесь, что токен имеет права на запись
          # cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          # cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          platforms: linux/amd64

      - name: Image digest
        if: github.event_name != 'pull_request'
        run: |
          echo "Built and pushed images:"
          echo "${{ steps.meta.outputs.tags }}"
          echo ""
          echo "Image digest:"
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest --format "{{json .}}" | jq -r '.digest' || echo "Digest not available"
          
      - name: Verify build
        if: github.event_name != 'pull_request'
        run: |
          echo "✅ Docker image built and pushed successfully"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo ""
          echo "To verify the image was pushed, check Docker Hub:"
          echo "https://hub.docker.com/r/${{ secrets.DOCKERHUB_USERNAME }}/bartech/tags"

  deploy:
    if: github.event_name != 'pull_request' && needs.build-and-push.result == 'success'
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    env:
      SSH_USER: ${{ secrets.SSH_USER }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Sync server .env from GitHub Actions secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_PORT: ${{ secrets.MINIO_PORT }}
          MINIO_USE_SSL: ${{ secrets.MINIO_USE_SSL }}
          MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
          BITRIX24_WEBHOOK_URL: ${{ secrets.BITRIX24_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          python3 << 'PY'
          import os, pathlib
          def v(key, default=None):
              x = os.environ.get(key)
              if x is None or x == "":
                  return default
              return x
          def line(k, val):
              val = "" if val is None else str(val)
              val = val.replace("\\", "\\\\").replace('"', '\\"').replace("\n", "\\n").replace("\r", "")
              return f'{k}="{val}"'
          m = {
              "DOCKERHUB_USERNAME": v("DOCKERHUB_USERNAME"),
              "AUTH_SECRET": v("AUTH_SECRET"),
              "DATABASE_URL": v("DATABASE_URL"),
              "POSTGRES_USER": v("POSTGRES_USER"),
              "POSTGRES_PASSWORD": v("POSTGRES_PASSWORD"),
              "POSTGRES_DB": v("POSTGRES_DB"),
              "MINIO_ACCESS_KEY": v("MINIO_ACCESS_KEY"),
              "MINIO_SECRET_KEY": v("MINIO_SECRET_KEY"),
              "MINIO_ENDPOINT": v("MINIO_ENDPOINT", "minio"),
              "MINIO_PORT": v("MINIO_PORT", "9000"),
              "MINIO_USE_SSL": v("MINIO_USE_SSL", "false"),
              "MINIO_BUCKET": v("MINIO_BUCKET", "images"),
              "BITRIX24_WEBHOOK_URL": v("BITRIX24_WEBHOOK_URL"),
          }
          required = (
              "DOCKERHUB_USERNAME", "AUTH_SECRET", "DATABASE_URL",
              "POSTGRES_USER", "POSTGRES_PASSWORD", "POSTGRES_DB",
              "MINIO_ACCESS_KEY", "MINIO_SECRET_KEY", "BITRIX24_WEBHOOK_URL",
          )
          miss = [k for k in required if not m.get(k)]
          if miss:
              raise SystemExit("Missing required GitHub Actions secrets (empty): " + ", ".join(miss))
          pathlib.Path("/tmp/bartech-prod.env").write_text(
              "\n".join(line(k, m[k]) for k in m) + "\n", encoding="utf-8"
          )
          PY
          scp /tmp/bartech-prod.env "${SSH_USER}@${SERVER_HOST}:/opt/bartech/.env"
          rm -f /tmp/bartech-prod.env
          ssh "${SSH_USER}@${SERVER_HOST}" "chmod 600 /opt/bartech/.env 2>/dev/null || true"

      # Deploy on server uses `docker compose` (v2 plugin); legacy `docker-compose` v1 hits KeyError: ContainerConfig on newer Docker Engine.
      - name: Sync repo on server (compose files)
        env:
          SYNC_REF: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          ssh "$SSH_USER@$SERVER_HOST" \
            "export SYNC_REF=$(printf '%q' "$SYNC_REF"); export DEFAULT_BRANCH=$(printf '%q' "$DEFAULT_BRANCH"); bash -s" <<'REMOTE'
            set -e
            cd /opt/bartech || { echo "ERROR: /opt/bartech missing"; exit 1; }
            if ! git rev-parse --git-dir >/dev/null 2>&1; then
              echo "SKIP: not a git clone — update compose files on the server manually if deploy errors persist."
              exit 0
            fi
            git fetch origin
            if git rev-parse --verify "origin/${SYNC_REF}" >/dev/null 2>&1; then
              git checkout -B "$SYNC_REF" "origin/${SYNC_REF}"
              git pull --ff-only origin "$SYNC_REF"
            else
              echo "Ref ${SYNC_REF} not on origin; using ${DEFAULT_BRANCH}"
              git checkout "$DEFAULT_BRANCH"
              git pull --ff-only origin "$DEFAULT_BRANCH"
            fi
            echo "Synced: $(git rev-parse --short HEAD) ($(git branch --show-current))"
          REMOTE

      - name: Deploy to server
        run: |
          ssh "$SSH_USER@$SERVER_HOST" << 'EOF'
            set -e
            cd /opt/bartech
            
            if [ ! -f .env ]; then
              echo "ERROR: .env file not found!"
              exit 1
            fi
            
            # Создание Docker volumes, если их нет
            echo "Checking Docker volumes..."
            if ! docker volume ls | grep -q "technobar_certbot-etc"; then
              echo "Creating volume technobar_certbot-etc..."
              docker volume create technobar_certbot-etc
            fi
            if ! docker volume ls | grep -q "technobar_certbot-var"; then
              echo "Creating volume technobar_certbot-var..."
              docker volume create technobar_certbot-var
            fi
            echo "Volumes ready"
            
            NEXT_IMAGE=$(docker compose -f docker-compose.yml -f docker-compose.prod.yml config --images 2>/dev/null | grep '/bartech' | head -n1 || true)
            if [ -z "$NEXT_IMAGE" ]; then
              DU=$(awk -F= '/^DOCKERHUB_USERNAME=/ {gsub(/^"|"$/,"",$2); print $2; exit}' .env)
              if [ -z "$DU" ]; then
                echo "ERROR: Could not resolve Next.js image (compose config --images and DOCKERHUB_USERNAME in .env)."
                exit 1
              fi
              NEXT_IMAGE="${DU}/bartech:latest"
            fi
            echo "Next.js image: $NEXT_IMAGE"
            
            AUTH_LEN=$(awk -F= '/^AUTH_SECRET=/ {gsub(/^"|"$/,"",$2); print length($2); exit}' .env)
            if [ -z "${AUTH_LEN:-}" ] || [ "$AUTH_LEN" -lt 32 ]; then
              echo "WARNING: AUTH_SECRET in .env should be at least 32 characters for production sessions."
            fi
            
            echo "Pulling latest Next.js image only..."
            docker pull "$NEXT_IMAGE" || {
              echo "ERROR: Failed to pull image $NEXT_IMAGE"
              echo "Available images:"
              docker images | grep bartech || echo "No bartech images found"
              echo "Trying to build image locally instead..."
              docker compose -f docker-compose.yml -f docker-compose.prod.yml build --no-cache nextjs || {
                echo "ERROR: Both pull and local build failed!"
                exit 1
              }
            }
            
            NEW_IMAGE_ID=$(docker images "$NEXT_IMAGE" --format "{{.ID}}" 2>/dev/null | head -n1)
            if [ -z "$NEW_IMAGE_ID" ]; then
              echo "ERROR: Image not present after pull: $NEXT_IMAGE"
              echo "Available images:"
              docker images | grep bartech || echo "No bartech images found"
              exit 1
            fi
            echo "Image pulled successfully: $NEXT_IMAGE"
            
            echo "Image details:"
            docker images "$NEXT_IMAGE" --format "table {{.Repository}}\t{{.Tag}}\t{{.ID}}\t{{.CreatedAt}}"
            
            if docker ps --format '{{.Names}}' | grep -q '^bartech-nginx$'; then
              echo "Recreating nextjs container only (postgres, minio, nginx, certbot keep running)..."
              docker compose -f docker-compose.yml -f docker-compose.prod.yml stop nextjs 2>/dev/null || true
              docker compose -f docker-compose.yml -f docker-compose.prod.yml rm -f nextjs 2>/dev/null || true
              docker ps -aq --filter "name=bartech-nextjs" | xargs -r docker rm -f 2>/dev/null || true
              docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps nextjs
            else
              echo "Nginx not running — starting full stack (first deploy or after manual down)..."
              docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
            fi
            
            # Очистка кеша Next.js после запуска контейнера
            echo "Clearing Next.js cache in container..."
            sleep 3
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T nextjs sh -c "rm -rf /app/.next/cache 2>/dev/null || true" || true
            
            # Ожидание запуска контейнеров
            echo "Waiting for containers to start..."
            sleep 5
            
            # Проверка статуса контейнеров
            echo "Checking container status..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
            
            # Ожидание готовности Next.js (проверка health check)
            echo "Waiting for Next.js to be ready..."
            max_attempts=30
            attempt=0
            while [ $attempt -lt $max_attempts ]; do
              if docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T nextjs wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/health 2>/dev/null; then
                echo "Next.js is ready!"
                break
              fi
              attempt=$((attempt + 1))
              echo "Attempt $attempt/$max_attempts: Next.js not ready yet, waiting..."
              sleep 2
            done
            
            if [ $attempt -eq $max_attempts ]; then
              echo "ERROR: Next.js failed to start after $max_attempts attempts"
              echo "Next.js logs:"
              docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=50 nextjs
              exit 1
            fi
            
            # Перезагрузка Nginx после готовности Next.js
            echo "Reloading Nginx..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T nginx nginx -s reload || true
            
            # Очистка старых образов
            echo "Cleaning up old images..."
            docker image prune -f
            
            # Проверка, что приложение работает и возвращает данные
            echo "Verifying application is serving fresh data..."
            sleep 3
            if docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T nextjs wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/health 2>/dev/null; then
              echo "✅ Application is running and health check passed"
            else
              echo "⚠️  Warning: Health check failed after deployment"
            fi
            
            echo "Deployment completed successfully!"
          EOF

      - name: Health check
        run: |
          echo "Waiting for application to be fully ready..."
          sleep 30
          
          # Проверяем напрямую на сервере через SSH (это главная проверка)
          echo "Checking health directly on server..."
          max_attempts=20
          attempt=0
          server_ready=false
          
          while [ $attempt -lt $max_attempts ]; do
            if ssh -o ConnectTimeout=5 "$SSH_USER@$SERVER_HOST" 'cd /opt/bartech && docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T nextjs wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/health 2>/dev/null'; then
              echo "✅ Server health check passed!"
              server_ready=true
              break
            fi
            attempt=$((attempt + 1))
            echo "Server health check attempt $attempt/$max_attempts failed, waiting..."
            sleep 3
          done
          
          if [ "$server_ready" = false ]; then
            echo "ERROR: Server health check failed after $max_attempts attempts"
            ssh "$SSH_USER@$SERVER_HOST" 'cd /opt/bartech && echo "=== Container Status ===" && docker compose -f docker-compose.yml -f docker-compose.prod.yml ps && echo "=== Next.js Logs (last 50 lines) ===" && docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=50 nextjs && echo "=== Nginx Logs (last 50 lines) ===" && docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=50 nginx'
            exit 1
          fi
          
          # Дополнительная проверка через Cloudflare (не критично)
          echo "Server is healthy! Optionally checking through Cloudflare..."
          sleep 5
          
          if curl -f --max-time 5 --connect-timeout 3 https://technobar.by/api/health 2>/dev/null; then
            echo "✅ Cloudflare health check also passed!"
          else
            echo "⚠️  Cloudflare check failed (may be caching), but server is operational"
          fi
          
          echo "✅ Deployment successful - server is running and healthy!"

