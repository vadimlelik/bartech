services:
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
      # Увеличиваем лимиты памяти для процесса сборки
      shm_size: '2gb'
    container_name: bartech-nextjs
    restart: unless-stopped
    # Лимиты памяти для runtime контейнера
    mem_limit: 4g
    memswap_limit: 4g
    environment:
      - NODE_ENV=production
      # Подпись JWT-сессий (в продакшене задайте длинный случайный секрет в .env)
      - AUTH_SECRET=${AUTH_SECRET:-local-docker-auth-secret-change-me-32chars}
      # MinIO / S3-совместимое хранилище для изображений
      - IMAGE_STORAGE_METHOD=minio
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_USE_SSL=false
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=images
      # Опционально Supabase (без :- Compose выводит WARN при каждом вызове, если переменных нет в .env)
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      # Prisma: явный DATABASE_URL из .env или сборка для сервиса postgres в этом compose (prod не должен затирать пустым ${DATABASE_URL})
      - DATABASE_URL=${DATABASE_URL:-postgresql://${POSTGRES_USER:-bartech}:${POSTGRES_PASSWORD:-bartech_password}@postgres:5432/${POSTGRES_DB:-bartech}?schema=public}
    networks:
      - app-network
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://127.0.0.1:3000/api/health',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  nginx:
    image: nginx:stable-alpine
    container_name: bartech-nginx
    restart: unless-stopped
    depends_on:
      nextjs:
        condition: service_healthy
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - technobar_certbot-etc:/etc/letsencrypt:ro
      - technobar_certbot-var:/var/lib/letsencrypt:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - app-network
    command: '/bin/sh -c ''while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'''
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  minio:
    image: minio/minio:latest
    container_name: bartech-minio
    restart: unless-stopped
    environment:
      # Образ MinIO ждёт ROOT_*; в .env по-прежнему MINIO_ACCESS_KEY / MINIO_SECRET_KEY (как у Next.js)
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - app-network
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  postgres:
    image: postgres:16-alpine
    container_name: bartech-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bartech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bartech_password}
      POSTGRES_DB: ${POSTGRES_DB:-bartech}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  certbot:
    image: certbot/dns-cloudflare:latest
    container_name: bartech-certbot
    restart: unless-stopped
    volumes:
      - technobar_certbot-etc:/etc/letsencrypt
      - technobar_certbot-var:/var/lib/letsencrypt
      - ./certbot/cloudflare.ini:/cloudflare.ini:ro
      - ./scripts/auto-renew-certs.sh:/auto-renew-certs.sh
      - ./scripts/reload-nginx.sh:/reload-nginx.sh
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - app-network
    entrypoint: "/bin/sh -c 'apk add --no-cache docker-cli >/dev/null 2>&1 || true; chmod +x /auto-renew-certs.sh /reload-nginx.sh && trap exit TERM; while :; do /auto-renew-certs.sh; sleep 12h & wait $${!}; done'"
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  technobar_certbot-etc:
    external: true
  technobar_certbot-var:
    external: true
  nginx_cache:
    driver: local
  minio_data:
    driver: local
  postgres_data:
    driver: local

networks:
  app-network:
    driver: bridge
