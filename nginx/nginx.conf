user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # ============================================================
    # 🔥 CLOUDLFARE REAL IP (БЕЗОПАСНО)
    # ============================================================

    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    # IPv4
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;

    # IPv6
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;

    # ============================================================
    # 🔥 PROXY CACHE (ОПТИМИЗИРОВАННЫЙ)
    # ============================================================

    proxy_cache_path /var/cache/nginx
        levels=1:2
        keys_zone=STATIC:50m
        max_size=2g
        inactive=30d
        use_temp_path=off;

    proxy_cache_key "$scheme$request_method$host$request_uri";

    proxy_cache_valid 200 301 302 30d;
    proxy_cache_valid 404 1h;

    proxy_cache_use_stale error timeout invalid_header updating
        http_500 http_502 http_503 http_504;

    proxy_cache_background_update on;
    proxy_cache_revalidate on;

    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ============================================================
    # REDIRECT mobile*.technobar.by
    # ============================================================

    server {
        listen 80;
        listen [::]:80;
        server_name ~^mobile.*\.technobar\.by$;
        return 301 https://mobile.baratex.by$request_uri;
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name ~^mobile.*\.technobar\.by$;

        ssl_certificate /etc/letsencrypt/live/technobar.by/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/technobar.by/privkey.pem;

        return 301 https://mobile.baratex.by$request_uri;
    }

    # ============================================================
    # TECHNOBAR HTTP → HTTPS
    # ============================================================

    server {
        listen 80;
        listen [::]:80;
        server_name technobar.by *.technobar.by;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        return 301 https://$host$request_uri;
    }

    # ============================================================
    # TECHNOBAR HTTPS
    # ============================================================

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name technobar.by *.technobar.by;

        ssl_certificate /etc/letsencrypt/live/technobar.by/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/technobar.by/privkey.pem;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            proxy_pass http://nextjs:3000;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
        }

        location /_next/static/ {
            proxy_pass http://nextjs:3000;
            proxy_cache STATIC;
            add_header Cache-Control "public, immutable, max-age=31536000" always;
        }

        location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
            proxy_pass http://nextjs:3000;
            proxy_cache STATIC;
            add_header Cache-Control "public, max-age=2592000" always;
        }

        location /_next/image {
            proxy_pass http://nextjs:3000;
            proxy_cache STATIC;
        }

        location /api/ {
            proxy_pass http://nextjs:3000;
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }
    }

    # ============================================================
    # BARATEX HTTP → HTTPS
    # ============================================================

    server {
        listen 80;
        listen [::]:80;
        server_name baratex.by *.baratex.by;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        return 301 https://$host$request_uri;
    }

    # ============================================================
    # BARATEX HTTPS
    # ============================================================

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name baratex.by *.baratex.by;

        ssl_certificate /etc/letsencrypt/live/baratex.by/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/baratex.by/privkey.pem;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            proxy_pass http://nextjs:3000;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 300s;
        }
    }
}